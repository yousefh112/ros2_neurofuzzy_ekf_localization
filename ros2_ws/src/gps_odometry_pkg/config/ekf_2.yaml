ekf_local2: # it has continous state estimation
  ros__parameters:
    use_sim_time: true
    frequency: 30.0
    sensor_timeout: 0.5
    two_d_mode: false
    publish_tf: true # publish the transform from map to base_link, so we can visualize it in rviz and use it for navigation
    
    map_frame: map
    odom_frame: odom
    base_link_frame: base_footprint
    world_frame: odom
    odom0: /odom
    #X,Y,Z,roll,pitch,yaw,X˙,Y˙,Z˙,roll˙,pitch˙,yaw˙,X¨,Y¨,Z¨
    odom0_config: [true, true, false,
                  false, false, true,
                  true,  true,  false,
                  false, false, true,
                  false, false, false]


    imu0: /imu/data
    imu0_config: [false, false, false,
                  false,  false,  false,
                  false, false, false,
                  false,  false,  true,
                  true,  true,  false]
              
    imu0_differential: false        
    imu0_relative: false
    imu0_queue_size: 10
    imu0_remove_gravitational_acceleration: false


