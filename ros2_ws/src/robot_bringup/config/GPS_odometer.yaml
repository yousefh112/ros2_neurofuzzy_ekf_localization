ekf_filter_node:
  ros__parameters:

    frequency: 30.0
    sensor_timeout: 0.1
    two_d_mode: false #we do not want 3D

    # If you're having trouble, try setting this to true, and then echo the /diagnostics_agg topic to see if the node is
    # unhappy with any settings or data.
    print_diagnostics: false

    # Whether to broadcast the transformation over the /tf topic. Defaults to true if unspecified.
    publish_tf: false #is the CF that combines the two and publish everything
    
    map_frame: map
    odom_frame: odom
    base_link_frame: bbase_footprint
    world_frame: map

    odom0: /odom
    odom0_config: [true,  true,  false, # x, y, z
                   false, false, true, # roll, pitch, yaw
                   true,  true,  false, # vx, vy, vz
                   false, false, true, # vroll, vpitch, vyaw
                   false, false, false] # ax, ay, az 
    #GPS (NavSatTransform)
    odom1: /odometry/gps
    odom1_config: [true,  true,  false, # X, Y (absolute position)
                   false, false, true,  # YAW (theta)
                   false, false, false,
                   false, false, false,
                   false, false, false]

process_noise_covariance: [
  0.00016, 0.00041, 0.0,    # x, y, z
  0.0, 0.0, 0.00003,        # roll, pitch, YAW
  0.0001, 0.000051, 0.0,    # vx, vy, vz 
  0.0, 0.0, 0.0,            # vroll, vpitch, vyaw
  0.0002, 0.0014, 0.0       # ax, ay, az 
]